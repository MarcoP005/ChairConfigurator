<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" href="assets/viewer3d-static/icons/favicon.png">
  <link rel="stylesheet" href="assets/viewer3d-static/style.css">
  <title>Chair Configuration</title>
</head>

<body>

  <div id="Viewer3D" class="viewer">
  </div>

  <div class="progress-bar-container" id="progress-bar-container">
    <img src="assets/viewer3d-static/icons/favicon.png" class="load-icon">
    <label for="progress-bar" class="progress-label">
      LOADING CONFIGURATION...
    </label>
    <progress id="progress-bar" class="progress-bar" value="0" max="100">
    </progress>
  </div>

  <div class="drawer">
    <p class="title">
      CONFIGURATION
    </p>

    <hr>

    <p class="subtitle">
      MODEL
    </p>

    <!-- BACK select -->
    <div class="row">
      <div class="icon-cell">
        <img src="assets/viewer3d-static/icons/ico_back.png">
      </div>
      <div class="content-cell">
        <label class="radio-btn">
          <input type="radio" name="back-select" id="back-0-rad" checked>
        </label>
        <label class="radio-btn">
          <input type="radio" name="back-select" id="back-1-rad">
        </label>
      </div>
    </div>

    <!-- SEAT select -->
    <div class="row">
      <div class="icon-cell">
        <img src="assets/viewer3d-static/icons/ico_seat.png">
      </div>
      <div class="content-cell">
        <label class="radio-btn">
          <input type="radio" name="seat-select" id="seat-0-rad" checked>
        </label>
        <label class="radio-btn">
          <input type="radio" name="seat-select" id="seat-1-rad">
        </label>
      </div>
    </div>

    <!-- LEG select -->
    <div class="row">
      <div class="icon-cell">
        <img src="assets/viewer3d-static/icons/ico_leg.png">
      </div>
      <div class="content-cell">
        <label class="radio-btn">
          <input type="radio" name="leg-select" id="leg-0-rad" checked>
        </label>
        <label class="radio-btn">
          <input type="radio" name="leg-select" id="leg-1-rad">
        </label>
        <label class="radio-btn">
          <input type="radio" name="leg-select" id="leg-2-rad">
        </label>
      </div>
    </div>

    <!-- ARM select -->
    <div class="row">
      <div class="icon-cell">
        <img src="assets/viewer3d-static/icons/ico_arm.png">
      </div>
      <div class="content-cell">
        <label class="radio-btn">
          <input type="radio" name="arm-select" id="arm-0-rad" checked>
        </label>
        <label class="radio-btn">
          <input type="radio" name="arm-select" id="arm-1-rad">
        </label>
        <label class="radio-btn">
          <input type="radio" name="arm-select" id="arm-2-rad">
        </label>
      </div>
    </div>

    <hr class="separator">

    <p class="subtitle">
      MATERIALS
    </p>

    <!-- SOFT material select -->
    <div class="row">
      <div class="icon-cell">
        <img src="assets/viewer3d-static/icons/ico_fabric.png">
      </div>
      <div class="content-cell row-inline">
        <label class="swatch-btn">
          <input type="radio" name="fabric-mat-select" id="fabric-mat-0-rad" checked>
          <img class="swatch-square mat-icon" src="assets/viewer3d-static/icons/fabric1.jpg"></img>
          <span class="swatch-label" id="fabric-mat-0-label">
          </span>
        </label>
        <label class="swatch-btn">
          <input type="radio" name="fabric-mat-select" id="fabric-mat-1-rad">
          <img class="swatch-square mat-icon" src="assets/viewer3d-static/icons/fabric2.jpg"></img>
          <span class="swatch-label" id="fabric-mat-1-label">
          </span>
        </label>
        <label class="swatch-btn">
          <input type="radio" name="fabric-mat-select" id="fabric-mat-2-rad">
          <img class="swatch-square mat-icon" src="assets/viewer3d-static/icons/fabric3.jpg"></img>
          <span class="swatch-label" id="fabric-mat-2-label">
          </span>
        </label>
      </div>
    </div>

    <!-- HARD material select-->
    <div class="row">
      <div class="icon-cell"><img src="assets/viewer3d-static/icons/ico_metal.png"></div>
      <div class="content-cell row-inline">
        <label class="swatch-btn">
          <input type="radio" name="metal-mat-select" id="metal-mat-0-rad" checked>
          <img class="swatch-square mat-icon" src="assets/viewer3d-static/icons/metal1.jpg"></img>
          <span class="swatch-label" id="metal-mat-0-label">
          </span>
        </label>
        <label class="swatch-btn">
          <input type="radio" name="metal-mat-select" id="metal-mat-1-rad">
          <img class="swatch-square mat-icon" src="assets/viewer3d-static/icons/metal2.jpg"></img>
          <span class="swatch-label" id="metal-mat-1-label">
          </span>
        </label>
        <label class="swatch-btn">
          <input type="radio" name="metal-mat-select" id="metal-mat-2-rad">
          <img class="swatch-square mat-icon" src="assets/viewer3d-static/icons/metal3.jpg"></img>
          <span class="swatch-label" id="metal-mat-2-label">
          </span>
        </label>
      </div>
    </div>

    <!-- OTHER material select -->
    <div class="row">
      <div class="icon-cell"><img src="assets/viewer3d-static/icons/ico_plastic.png"></div>
      <div class="content-cell row-inline">
        <label class="swatch-btn">
          <input type="radio" name="plastic-mat-select" id="plastic-mat-0-rad" checked>
          <img class="swatch-square mat-icon" src="assets/viewer3d-static/icons/plastic1.jpg"></img>
          <span class="swatch-label" id="plastic-mat-0-label">
          </span>
        </label>
        <label class="swatch-btn">
          <input type="radio" name="plastic-mat-select" id="plastic-mat-1-rad">
          <img class="swatch-square mat-icon" src="assets/viewer3d-static/icons/plastic2.jpg"></img>
          <span class="swatch-label" id="plastic-mat-1-label">
          </span>
        </label>
        <label class="swatch-btn">
          <input type="radio" name="plastic-mat-select" id="plastic-mat-2-rad">
          <img class="swatch-square mat-icon" src="assets/viewer3d-static/icons/plastic3.jpg"></img>
          <span class="swatch-label" id="plastic-mat-2-label">
          </span>
        </label>
      </div>
    </div>

    <hr class="separator">

    <p class="subtitle">
      SETTINGS
    </p>

    <div class="row setting-row">
      <button id="reset-cam-btn" class="btn">reset camera position</button>
    </div>

    <div class="row setting-row">
      <span class="setting-label">
        Auto rotate
      </span>
      <label class="toggle">
        <input type="checkbox" id="autorotate-chkbx">
        <span class="toggle-slider"></span>
      </label>
    </div>

    <div class="row setting-row">
      <span class="setting-label">
        Lights
      </span>
      <label class="toggle">
        <input type="checkbox" id="lights-chkbx" checked>
        <span class="toggle-slider"></span>
      </label>
    </div>

    <hr class="separator">

    <p class="subtitle">
      EXPORT
    </p>

    <div class="btn-container">
      <button class="download-btn" id="download-config-btn">
        <img src="assets/viewer3d-static/icons/ico_download.png">
        download configuration (.pdf)
      </button>
    </div>
  </div>
</body>

<script>
  let viewer3D = new Viewer3D(
    {
      containerID: "Viewer3D"
    }
  );
  window.Viewer3D = viewer3D;
</script>

</html>
