<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" href="assets/viewer3d-static/favicon.ico">
  <link rel="stylesheet" href="assets/viewer3d-static/style.css">
  <title>Chair Configuration</title>
</head>

<body>

  <div id="Viewer3D" class="viewer">
  </div>

  <div class="drawer">
    <p class="title">
      CONFIGURATION
    </p>

    <hr>

    <p class="subtitle">
      MODEL
    </p>

    <!-- BACK select -->
    <div class="row">
      <div class="icon-cell">
        <img src="assets/viewer3d-static/icons/ico_back.png">
      </div>
      <div class="content-cell">
        <label class="radio-btn">
          <input type="radio" name="back-select" id="square-back-rad" checked> square
        </label>
        <label class="radio-btn">
          <input type="radio" name="back-select" id="round-back-rad"> round
        </label>
      </div>
    </div>

    <!-- SEAT select -->
    <div class="row">
      <div class="icon-cell">
        <img src="assets/viewer3d-static/icons/ico_seat.png">
      </div>
      <div class="content-cell">
        <label class="radio-btn">
          <input type="radio" name="seat-select" id="square-seat-rad" checked> square
        </label>
        <label class="radio-btn">
          <input type="radio" name="seat-select" id="round-seat-rad"> round
        </label>
      </div>
    </div>

    <!-- LEG select -->
    <div class="row">
      <div class="icon-cell">
        <img src="assets/viewer3d-static/icons/ico_leg.png">
      </div>
      <div class="content-cell">
        <label class="radio-btn">
          <input type="radio" name="leg-select" id="wheels-leg-rad" checked> wheels
        </label>
        <label class="radio-btn">
          <input type="radio" name="leg-select" id="tulip-leg-rad"> tulip
        </label>
        <label class="radio-btn">
          <input type="radio" name="leg-select" id="cantilever-leg-rad"> cantilever
        </label>
      </div>
    </div>

    <!-- ARM select -->
    <div class="row">
      <div class="icon-cell">
        <img src="assets/viewer3d-static/icons/ico_arm.png">
      </div>
      <div class="content-cell">
        <label class="radio-btn">
          <input type="radio" name="arm-select" id="curve-arm-rad" checked> curve
        </label>
        <label class="radio-btn">
          <input type="radio" name="arm-select" id="straight-arm-rad"> straight
        </label>
        <label class="radio-btn">
          <input type="radio" name="arm-select" id="lateral-arm-rad"> lateral
        </label>
      </div>
    </div>

    <hr class="separator">

    <p class="subtitle">
      MATERIALS
    </p>

    <!-- SOFT material select -->
    <div class="row">
      <div class="icon-cell">
        <img src="assets/viewer3d-static/icons/ico_soft.png">
      </div>
      <div class="content-cell row-inline">
        <label class="swatch-btn">
          <input type="radio" name="soft-mat-select" id="soft-mat-1-rad" checked>
          <span class="swatch-square" style="background-color: #222222;"></span>
          <span class="swatch-label">
            poplin
          </span>
        </label>
        <label class="swatch-btn">
          <input type="radio" name="soft-mat-select" id="soft-mat-2-rad">
          <span class="swatch-square" style="background-color: #aaaaaa;"></span>
          <span class="swatch-label">
            leather
          </span>
        </label>
        <label class="swatch-btn">
          <input type="radio" name="soft-mat-select" id="soft-mat-3-rad">
          <span class="swatch-square" style="background-color: #f0f0f0;"></span>
          <span class="swatch-label">
            fabric
          </span>
        </label>
      </div>
    </div>

    <!-- HARD material select-->
    <div class="row">
      <div class="icon-cell"><img src="assets/viewer3d-static/icons/ico_hard.png"></div>
      <div class="content-cell row-inline">
        <label class="swatch-btn">
          <input type="radio" name="hard-mat-select" id="hard-mat-1-rad" checked>
          <span class="swatch-square" style="background-color: #222222;"></span>
          <span class="swatch-label">
            metal
          </span>
        </label>
        <label class="swatch-btn">
          <input type="radio" name="hard-mat-select" id="hard-mat-2-rad">
          <span class="swatch-square" style="background-color: #aaaaaa;"></span>
          <span class="swatch-label">
            gray
          </span>
        </label>
        <label class="swatch-btn">
          <input type="radio" name="hard-mat-select" id="hard-mat-3-rad">
          <span class="swatch-square" style="background-color: #f0f0f0;"></span>
          <span class="swatch-label">
            plastic
          </span>
        </label>
      </div>
    </div>

    <!-- OTHER material select -->
    <div class="row">
      <div class="icon-cell"><img src="assets/viewer3d-static/icons/ico_other.png"></div>
      <div class="content-cell row-inline">
        <label class="swatch-btn">
          <input type="radio" name="other-mat-select" id="other-mat-1-rad" checked>
          <span class="swatch-square" style="background-color: #222222;"></span>
          <span class="swatch-label">
            metal
          </span>
        </label>
        <label class="swatch-btn">
          <input type="radio" name="other-mat-select" id="other-mat-2-rad">
          <span class="swatch-square" style="background-color: #aaaaaa;"></span>
          <span class="swatch-label">
            gray
          </span>
        </label>
        <label class="swatch-btn">
          <input type="radio" name="other-mat-select" id="other-mat-3-rad">
          <span class="swatch-square" style="background-color: #f0f0f0;"></span>
          <span class="swatch-label">
            plastic
          </span>
        </label>
      </div>
    </div>

    <hr class="separator">

    <p class="subtitle">
      SETTINGS
    </p>

    <div class="row setting-row">
      <span class="setting-label">
        Auto rotate
      </span>
      <label class="toggle">
        <input type="checkbox" id="autorotate-chkbx">
        <span class="toggle-slider"></span>
      </label>
    </div>

    <div class="row setting-row" style="margin-bottom: 20px;">
      <span class="setting-label">
        Lights
      </span>
      <label class="toggle">
        <input type="checkbox" id="lights-chkbx" checked>
        <span class="toggle-slider"></span>
      </label>
    </div>

  </div>
</body>

<script>
  let viewer3D = new Viewer3D(
    {
      containerID: "Viewer3D"
    }
  );
  window.Viewer3D = viewer3D;
</script>

</html>
