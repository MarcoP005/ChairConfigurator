<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" href="assets/viewer3d-static/favicon.ico">
  <link rel="stylesheet" href="assets/viewer3d-static/style.css">
  <title>Chair Configuration</title>
</head>

<body style="width: 100vw; height: 100vh; overflow: hidden; display: flex;">
  <div id="Viewer3D" style="flex: 1; min-width: 0;">
  </div>



  <div class="drawer" style="height: 100vh;">
    <p class="text title">CONFIGURATION</p>

    <hr>

    <p class="text subtitle-section">MODEL</p>

    <div class="row">
      <div class="icon-cell"><img src="assets/viewer3d-static/ico_back.png"></div>
      <div class="content-cell">
        <label class="radio-btn text" style="border-radius: 5px 5px 0 0;">
          <input type="radio" name="back" checked id="squareBack"> square
        </label>
        <label class="radio-btn text" style="border-radius: 0 0 5px 5px;">
          <input type="radio" name="back" id="roundBack"> round
        </label>
      </div>
    </div>

    <div class="row">
      <div class="icon-cell"><img src="assets/viewer3d-static/ico_seat.png"></div>
      <div class="content-cell">
        <label class="radio-btn text" style="border-radius: 5px 5px 0 0;">
          <input type="radio" name="seat" checked id="squareSeat"> square
        </label>
        <label class="radio-btn text" style="border-radius: 0 0 5px 5px;">
          <input type="radio" name="seat" id="roundSeat"> round
        </label>
      </div>
    </div>

    <div class="row">
      <div class="icon-cell"><img src="assets/viewer3d-static/ico_leg.png"></div>
      <div class="content-cell">
        <label class="radio-btn text" style="border-radius: 5px 5px 0 0;">
          <input type="radio" name="leg" checked id="wheels"> wheels
        </label>
        <label class="radio-btn text">
          <input type="radio" name="leg" id="tulip"> tulip
        </label>
        <label class="radio-btn text" style="border-radius: 0 0 5px 5px;">
          <input type="radio" name="leg" id="cantilever"> cantilever
        </label>
      </div>
    </div>

    <div class="row">
      <div class="icon-cell"><img src="assets/viewer3d-static/ico_arm.png"></div>
      <div class="content-cell">
        <label class="radio-btn text" style="border-radius: 5px 5px 0 0;">
          <input type="radio" name="arm" checked id="curve"> curve
        </label>
        <label class="radio-btn text">
          <input type="radio" name="arm" id="straight"> straight
        </label>
        <label class="radio-btn text" style="border-radius: 0 0 5px 5px;">
          <input type="radio" name="arm" id="lateral"> lateral
        </label>
      </div>
    </div>

    <hr class="separator">

    <p class="text subtitle-section">MATERIALS</p>

    <div class="row">
      <div class="icon-cell"><img src="assets/viewer3d-static/ico_soft.png" alt="logo"></div>
      <div class="content-cell row-inline">
        <label class="swatch-btn">
          <input type="radio" name="soft" checked id="soft-mat-1">
          <span class="swatch-square" style="background-color: #222222;"></span>
          <span class="swatch-label">poplin</span>
        </label>
        <label class="swatch-btn">
          <input type="radio" name="soft" id="soft-mat-2">
          <span class="swatch-square" style="background-color: #aaaaaa;"></span>
          <span class="swatch-label">leather</span>
        </label>
        <label class="swatch-btn">
          <input type="radio" name="soft" id="soft-mat-3">
          <span class="swatch-square" style="background-color: #f0f0f0;"></span>
          <span class="swatch-label">fabric</span>
        </label>
      </div>
    </div>

    <div class="row">
      <div class="icon-cell"><img src="assets/viewer3d-static/ico_hard.png" alt="logo"></div>
      <div class="content-cell row-inline">
        <label class="swatch-btn">
          <input type="radio" name="hard" checked>
          <span class="swatch-square" style="background-color: #222222;"></span>
          <span class="swatch-label">metal</span>
        </label>
        <label class="swatch-btn">
          <input type="radio" name="hard">
          <span class="swatch-square" style="background-color: #aaaaaa;"></span>
          <span class="swatch-label">gray</span>
        </label>
        <label class="swatch-btn">
          <input type="radio" name="hard">
          <span class="swatch-square" style="background-color: #f0f0f0;"></span>
          <span class="swatch-label">plastic</span>
        </label>
      </div>
    </div>

    <div class="row">
      <div class="icon-cell"><img src="assets/viewer3d-static/ico_other.png" alt="logo"></div>
      <div class="content-cell row-inline">
        <label class="swatch-btn">
          <input type="radio" name="other" checked>
          <span class="swatch-square" style="background-color: #222222;"></span>
          <span class="swatch-label">metal</span>
        </label>
        <label class="swatch-btn">
          <input type="radio" name="other">
          <span class="swatch-square" style="background-color: #aaaaaa;"></span>
          <span class="swatch-label">gray</span>
        </label>
        <label class="swatch-btn">
          <input type="radio" name="other">
          <span class="swatch-square" style="background-color: #f0f0f0;"></span>
          <span class="swatch-label">plastic</span>
        </label>
      </div>
    </div>

    <hr class="separator">
    <p class="text subtitle-section">SETTINGS</p>

    <div class="row setting-row">
      <span class="text setting-label">Auto rotate</span>
      <label class="toggle">
        <input type="checkbox" id="autorotate">
        <span class="toggle-slider"></span>
      </label>
    </div>

    <div class="row setting-row" style="margin-bottom: 20px;">
      <span class="text setting-label">Lights</span>
      <label class="toggle">
        <input type="checkbox" id="lights" checked>
        <span class="toggle-slider"></span>
      </label>
    </div>

  </div>



</body>

<script>
  let viewer3D = new Viewer3D(
    {
      // the id of the container where the component will live
      containerID: "Viewer3D"
    }
  );
  window.Viewer3D = viewer3D;
</script>

</html>
