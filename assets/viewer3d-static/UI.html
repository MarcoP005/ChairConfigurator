<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>DEBUGGING FOR UI DESIGN</title>
</head>

<body style="background-color: #7a7a7a;">

    <!-- UI -->
    <div class="UI">
        <div class="drawer">
            <p class="text title">CONFIGURATION</p>

            <hr>

            <p class="text subtitle-section">MODEL</p>

            <div class="row">
                <div class="icon-cell"><img src="ico_back.png"></div>
                <div class="content-cell">
                    <label class="radio-btn text" style="border-radius: 5px 5px 0 0;">
                        <input type="radio" name="back" checked> square
                    </label>
                    <label class="radio-btn text" style="border-radius: 0 0 5px 5px;">
                        <input type="radio" name="back"> round
                    </label>
                </div>
            </div>

            <div class="row">
                <div class="icon-cell"><img src="ico_seat.png"></div>
                <div class="content-cell">
                    <label class="radio-btn text" style="border-radius: 5px 5px 0 0;">
                        <input type="radio" name="seat" checked> square
                    </label>
                    <label class="radio-btn text" style="border-radius: 0 0 5px 5px;">
                        <input type="radio" name="seat"> round
                    </label>
                </div>
            </div>

            <div class="row">
                <div class="icon-cell"><img src="ico_leg.png"></div>
                <div class="content-cell">
                    <label class="radio-btn text" style="border-radius: 5px 5px 0 0;">
                        <input type="radio" name="leg" checked> wheels
                    </label>
                    <label class="radio-btn text">
                        <input type="radio" name="leg"> tulip
                    </label>
                    <label class="radio-btn text" style="border-radius: 0 0 5px 5px;">
                        <input type="radio" name="leg"> cantilever
                    </label>
                </div>
            </div>

            <div class="row">
                <div class="icon-cell"><img src="ico_arm.png"></div>
                <div class="content-cell">
                    <label class="radio-btn text" style="border-radius: 5px 5px 0 0;">
                        <input type="radio" name="arm" checked> curve
                    </label>
                    <label class="radio-btn text">
                        <input type="radio" name="arm"> straight
                    </label>
                    <label class="radio-btn text" style="border-radius: 0 0 5px 5px;">
                        <input type="radio" name="arm"> lateral
                    </label>
                </div>
            </div>

            <hr class="separator">

            <p class="text subtitle-section">MATERIALS</p>

            <div class="row">
                <div class="icon-cell"><img src="ico_soft.png" alt="logo"></div>
                <div class="content-cell row-inline">
                    <label class="swatch-btn">
                        <input type="radio" name="material1" checked>
                        <span class="swatch-square" style="background-color: #4caf50;"></span>
                        <span class="swatch-label">poplin</span>
                    </label>
                    <label class="swatch-btn">
                        <input type="radio" name="material1">
                        <span class="swatch-square" style="background-color: #333333;"></span>
                        <span class="swatch-label">leather</span>
                    </label>
                    <label class="swatch-btn">
                        <input type="radio" name="material1">
                        <span class="swatch-square" style="background-color: #3a5a8c;"></span>
                        <span class="swatch-label">fabric</span>
                    </label>
                </div>
            </div>

            <div class="row">
                <div class="icon-cell"><img src="ico_hard.png" alt="logo"></div>
                <div class="content-cell row-inline">
                    <label class="swatch-btn">
                        <input type="radio" name="material2" checked>
                        <span class="swatch-square" style="background-color: #222222;"></span>
                        <span class="swatch-label">metal</span>
                    </label>
                    <label class="swatch-btn">
                        <input type="radio" name="material2">
                        <span class="swatch-square" style="background-color: #aaaaaa;"></span>
                        <span class="swatch-label">gray</span>
                    </label>
                    <label class="swatch-btn">
                        <input type="radio" name="material2">
                        <span class="swatch-square" style="background-color: #f0f0f0; border: 1px solid #ccc;"></span>
                        <span class="swatch-label">plastic</span>
                    </label>
                </div>
            </div>

            <div class="row">
                <div class="icon-cell"><img src="ico_other.png" alt="logo"></div>
                <div class="content-cell row-inline">
                    <label class="swatch-btn">
                        <input type="radio" name="material3" checked>
                        <span class="swatch-square" style="background-color: #222222;"></span>
                        <span class="swatch-label">metal</span>
                    </label>
                    <label class="swatch-btn">
                        <input type="radio" name="material3">
                        <span class="swatch-square" style="background-color: #aaaaaa;"></span>
                        <span class="swatch-label">gray</span>
                    </label>
                    <label class="swatch-btn">
                        <input type="radio" name="material3">
                        <span class="swatch-square" style="background-color: #f0f0f0; border: 1px solid #ccc;"></span>
                        <span class="swatch-label">plastic</span>
                    </label>
                </div>
            </div>

            <hr class="separator">
            <p class="text subtitle-section">SETTINGS</p>

            <div class="row setting-row">
                <span class="text setting-label">Auto rotate</span>
                <label class="toggle">
                    <input type="checkbox">
                    <span class="toggle-slider"></span>
                </label>
            </div>

            <div class="row setting-row" style="margin-bottom: 20px;" >
                <span class="text setting-label">Lights</span>
                <label class="toggle">
                    <input type="checkbox">
                    <span class="toggle-slider"></span>
                </label>
            </div>

        </div>
    </div>

</body>

</html>
